faqs:
  - topic: wrong_order
    keywords: [wrong, incorrect, missing, item, got, received, not what]
    answer: |
      We're really sorry about that! Wrong or missing items are rare but we take them seriously.
      Please describe what was wrong and we'll make it right. If you'd like to speak to someone directly, just say "talk to human".

  - topic: late_delivery
    keywords: [late, delay, delayed, waiting, not arrived, where is, long, taking]
    answer: |
      We apologise for the wait! Our deliveries are usually on time but traffic and kitchen load can sometimes cause delays.
      You can check your live delivery status by asking "my order status". If it's been over 30 minutes past your expected time, say "talk to human" and we'll look into it immediately.

  - topic: refund
    keywords: [refund, money back, cancel, cancellation, return, charge, overcharged]
    answer: |
      We process refunds for valid cases within 3-5 business days to your original payment method.
      For cancellations, orders can only be cancelled before they enter preparation. Please say "talk to human" and we'll check your order status and process accordingly.

  - topic: food_quality
    keywords: [bad, stale, taste, quality, cold, undercooked, overcooked, spoiled, smell]
    answer: |
      We're so sorry to hear that! Food quality is our top priority and this is unacceptable.
      Please describe the issue and say "talk to human" so we can personally follow up and make it right.

  - topic: allergy
    keywords: [allergy, allergic, intolerance, gluten, dairy, nut, peanut, lactose, vegan]
    answer: |
      Your safety is our priority.
      All our meals are prepared fresh in a home kitchen. We can accommodate most dietary requirements with advance notice.
      Please mention your allergy when placing your order in the notes field, or say "talk to human" to speak with us directly before ordering.

  - topic: bulk_order
    keywords: [bulk, corporate, office, event, party, large, catering, group]
    answer: |
      We love catering for events and offices.
      For bulk orders (10+ meals), please visit https://healthymealspot.com or say "talk to human" and we'll put together a custom quote for you.

  - topic: payment_issue
    keywords: [payment, paid, not reflecting, upi, failed, transaction, charged twice]
    answer: |
      Payment issues are usually resolved within a few minutes. If your UPI payment went through but the order shows unpaid, please wait 5 minutes and check again.
      If it's still not updated, say "talk to human" with your UPI transaction ID and we'll sort it out immediately.

  - topic: delivery_area
    keywords: [deliver, area, location, pincode, zone, available, serviceable]
    answer: |
      We currently deliver within a limited radius from our kitchen. You can check if your area is serviceable when placing an order at https://healthymealspot.com.
      If you're just outside our zone, say "talk to human". We sometimes make exceptions for regular customers.

  - topic: ordering
    keywords: [how to order, place order, website, app, order online]
    answer: |
      Ordering is easy. Visit https://healthymealspot.com, browse the menu, and place your order.
      You'll receive a WhatsApp confirmation with your invoice and payment QR code right here.

  - topic: timings
    keywords: [timing, open, close, hours, when, available, lunch, dinner, breakfast]
    answer: |
      We prepare fresh meals daily. Our menu and availability are updated on the website each morning.
      Check today's menu by asking "show menu" or visit https://healthymealspot.com.

escalation_triggers:
  - talk to human
  - speak to someone
  - contact support
  - real person
  - manager
  - call me
