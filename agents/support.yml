agent:
  name: support-agent
  domain: support
  version: "1.0.0"
  description: "Ray's Home Kitchen — Customer support agent"
  skip_domain_gate: true   # support accepts all messages restaurant couldn't handle

  error_message: "Something went wrong. Please try again."

  escalation:
    admin_phone: "+919594614752"
    trigger_phrases:
      - talk to human
      - speak to someone
      - contact support
      - real person
      - agent
      - manager
      - call me

intents:
  support:
    tool: support_faq
    auth_required: false

tools:
  support_faq:
    type: support
    faq_path: "./agents/support/faq.yml"
    db_path: "/path/to/orders.db"
    business_name: "Your Business Name"
    escalation_phone: "+91XXXXXXXXXX"
