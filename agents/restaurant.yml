agent:
  name: restaurant-agent
  domain: food
  version: "1.0.0"
  description: "Ray's Home Kitchen — WhatsApp AI assistant"
  chain:
    - agents/support.yml

  greet_message: "👋 Welcome to Ray's Home Kitchen!\n\nI can help you with:\n• View today's menu\n• Check your order status\n\nWhat would you like?"
  help_message: "You can ask me to:\n• Show the menu\n• Check your order status"
  out_of_domain_message: "Sorry, I can only help with food orders and menu queries."
  restricted_message: "Sorry, I cannot perform that request."
  error_message: "Something went wrong. Please try again."

intent_hints:
  greet: "customer says hi, hello, hey, good morning, namaste, or any greeting"
  help: "customer asks what can you do, how does this work, or asks for help"
  show_menu: "customer asks about food, menu, items, prices, veg, non-veg, today's special, what's available"
  order_status: "customer asks about their order, delivery, payment, invoice, receipt, QR code, when will it arrive"

intents:
  greet:
    tool: static_greet
    auth_required: false

  help:
    tool: static_help
    auth_required: false

  show_menu:
    tool: rag_menu
    auth_required: false

  order_status:
    tool: order_lookup
    auth_required: false

tools:
  static_greet:
    type: static

  static_help:
    type: static

  rag_menu:
    type: rag
    db_path: "/path/to/orders.db"
    vectordb_path: "./vectordb"
    table: restaurant
    system_prompt: |
      You are a helpful assistant for Ray's Home Kitchen, a home-cooked food delivery service.
      Answer using ONLY the provided menu data. Be concise and well formatted.
      Only include items relevant to what was asked. Do NOT make up items or prices.
      If nothing matches, say so clearly.

  order_lookup:
    type: sqlite
    db_path: "/path/to/orders.db"
    table: orders
    upi_handle: "XXXXXXXXXX@pthdfc"
    website: "yourdomain.com"
    brand_label: "yourdomain.com"
    country_code: "91"
