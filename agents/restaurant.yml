agent:
  name: restaurant-agent
  domain: food
  version: "3.0.0"
  description: "Healthy Meal Spot — WhatsApp assistant"
  error_message: "Something went wrong. Please try again."
  out_of_domain_message: "For that, please visit healthymealspot.com — we can help with questions and support here."

intent_hints:
  greet: "customer says hi, hello, thanks, bye, or starts a casual conversation"
  faq: "customer asks a question about the business — hours, location, delivery areas, pickup, payment methods, website, contact, pricing, offerings, policies, or how something works"
  support: "customer has a complaint, problem, food issue, wrong item, missing item, bad quality, late delivery, allergy concern, or wants to escalate an issue"
  order_or_menu: "customer wants to see the menu, browse dishes, place an order, check order status, or do anything related to ordering"

intents:
  greet:
    tool: concierge
    auth_required: false

  faq:
    tool: concierge
    auth_required: false

  support:
    tool: support_notify
    auth_required: false

  order_or_menu:
    tool: website_redirect
    auth_required: false

  unknown:
    tool: concierge
    auth_required: false

tools:
  concierge:
    type: business_chat
    business_name: "Healthy Meal Spot"
    cuisine: "home-style Indian food"
    tone: "warm, sharp, and naturally business-aware"
    greeting: "Welcome to Healthy Meal Spot!"
    greeting_once: true
    signature_line: "Stay hungry, stay healthy! 🍛"
    signature_once: true

  website_redirect:
    type: website_redirect
    website: "https://healthymealspot.com"
    message: "To browse our menu and place orders, visit 👉 healthymealspot.com"

  support_notify:
    type: support_notify
    escalation_phone: "+919594614752"
    db_path: "./data/orders.db"
